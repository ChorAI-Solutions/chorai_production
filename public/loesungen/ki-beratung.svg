<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b86"/>
      <stop offset="1" stop-color="#0a1525"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#f6f7fb" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="170" fill="#ec4899" opacity="0.18"/>
  <circle cx="170" cy="560" r="220" fill="#3b82f6" opacity="0.12"/>

  <rect x="120" y="120" width="960" height="435" rx="28" fill="url(#panel)" stroke="#0b0b86" stroke-opacity="0.08"/>

  <text x="170" y="195" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="800" fill="#0b0b86">
    KI-Beratung: Klarer Fahrplan
  </text>
  <text x="170" y="232" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" fill="#334155">
    Von der Idee bis zur umsetzbaren Roadmap – verständlich für den Betrieb.
  </text>

  <!-- Steps -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial">
    <g transform="translate(170 285)">
      <rect width="210" height="170" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="34" cy="38" r="18" fill="#3b82f6" opacity="0.15"/>
      <path d="M26 38h16M34 30v16" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
      <text x="24" y="80" font-size="16" font-weight="800" fill="#0b0b86">1. Ist-Check</text>
      <text x="24" y="108" font-size="13" fill="#475569">Abläufe, Tools,</text>
      <text x="24" y="128" font-size="13" fill="#475569">Zeitfresser.</text>
    </g>

    <g transform="translate(410 285)">
      <rect width="210" height="170" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="34" cy="38" r="18" fill="#ec4899" opacity="0.15"/>
      <path d="M24 42c12-14 28-14 40 0" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
      <path d="M24 32c12-14 28-14 40 0" stroke="#ec4899" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
      <text x="24" y="80" font-size="16" font-weight="800" fill="#0b0b86">2. Use-Cases</text>
      <text x="24" y="108" font-size="13" fill="#475569">2–3 konkrete</text>
      <text x="24" y="128" font-size="13" fill="#475569">Ansätze.</text>
    </g>

    <g transform="translate(650 285)">
      <rect width="210" height="170" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="34" cy="38" r="18" fill="#22c55e" opacity="0.15"/>
      <path d="M26 40l8 8 16-22" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="24" y="80" font-size="16" font-weight="800" fill="#0b0b86">3. DSGVO</text>
      <text x="24" y="108" font-size="13" fill="#475569">Daten, Rollen,</text>
      <text x="24" y="128" font-size="13" fill="#475569">Grenzen.</text>
    </g>

    <g transform="translate(890 285)">
      <rect width="210" height="170" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="34" cy="38" r="18" fill="#0b0b86" opacity="0.12"/>
      <path d="M24 48h40M24 38h30M24 28h18" stroke="#0b0b86" stroke-width="3" stroke-linecap="round"/>
      <text x="24" y="80" font-size="16" font-weight="800" fill="#0b0b86">4. Roadmap</text>
      <text x="24" y="108" font-size="13" fill="#475569">Prioritäten &amp;</text>
      <text x="24" y="128" font-size="13" fill="#475569">nächster Schritt.</text>
    </g>
  </g>

  <!-- Connectors -->
  <g fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <path d="M385 370h20"/>
    <path d="M625 370h20"/>
    <path d="M865 370h20"/>
    <path d="M395 370l-10-8M395 370l-10 8"/>
    <path d="M635 370l-10-8M635 370l-10 8"/>
    <path d="M875 370l-10-8M875 370l-10 8"/>
  </g>
</svg>
