<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1525"/>
      <stop offset="1" stop-color="#0b0b86"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1222" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0f1b33" stop-opacity="0.82"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="980" cy="140" r="180" fill="#ec4899" opacity="0.14"/>
  <circle cx="220" cy="540" r="220" fill="#3b82f6" opacity="0.12"/>

  <rect x="110" y="125" width="980" height="425" rx="28" fill="url(#panel)" stroke="#3b82f6" stroke-opacity="0.22"/>

  <text x="160" y="190" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="800" fill="#e2e8f0">
    KI-Chatbot: Fragen klären, Leads sammeln
  </text>
  <text x="160" y="228" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" fill="#cbd5e1" opacity="0.9">
    24/7 erreichbar – strukturiert statt „kurzer Frage“-Chaos.
  </text>

  <!-- Chat window -->
  <g transform="translate(160 270)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial">
    <rect width="560" height="260" rx="22" fill="#0a1525" stroke="#334155"/>
    <rect x="22" y="22" width="516" height="38" rx="14" fill="#0f1b33" stroke="#334155"/>
    <text x="40" y="48" font-size="13" fill="#cbd5e1">Chat</text>
    <circle cx="514" cy="41" r="6" fill="#22c55e"/>

    <rect x="22" y="78" width="360" height="44" rx="18" fill="#0f1b33" stroke="#334155"/>
    <text x="40" y="106" font-size="13" fill="#cbd5e1">„Was kostet das ungefähr?“</text>
    <rect x="170" y="130" width="368" height="60" rx="20" fill="#1d4ed8" opacity="0.55" stroke="#3b82f6"/>
    <text x="190" y="160" font-size="13" fill="#e2e8f0">Antwort + kurze Rückfrage</text>
    <text x="190" y="178" font-size="13" fill="#e2e8f0">„PLZ + Leistung + Foto?“</text>

    <rect x="22" y="205" width="516" height="44" rx="18" fill="#0f1b33" stroke="#334155"/>
    <text x="40" y="233" font-size="13" fill="#94a3b8">Eingabefeld …</text>
  </g>

  <!-- Lead card -->
  <g transform="translate(760 290)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial">
    <rect width="330" height="220" rx="22" fill="#0a1525" stroke="#334155"/>
    <text x="22" y="44" font-size="16" font-weight="800" fill="#e2e8f0">Lead-Info</text>
    <g fill="#94a3b8" opacity="0.9">
      <rect x="22" y="66" width="286" height="18" rx="9"/>
      <rect x="22" y="94" width="250" height="18" rx="9"/>
      <rect x="22" y="122" width="270" height="18" rx="9"/>
      <rect x="22" y="150" width="230" height="18" rx="9"/>
    </g>
    <rect x="22" y="178" width="286" height="24" rx="12" fill="#22c55e" opacity="0.22" stroke="#22c55e"/>
    <text x="36" y="196" font-size="12" fill="#86efac">Vollständig: bereit fürs Angebot</text>
  </g>

  <!-- Connector -->
  <g fill="none" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" opacity="0.75">
    <path d="M720 400h40"/>
    <path d="M760 400l-12-9M760 400l-12 9"/>
  </g>
</svg>
