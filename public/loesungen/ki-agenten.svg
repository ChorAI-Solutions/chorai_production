<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b86"/>
      <stop offset="1" stop-color="#0a1525"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1222" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0f1b33" stop-opacity="0.82"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="180" fill="#22c55e" opacity="0.12"/>
  <circle cx="220" cy="560" r="220" fill="#ec4899" opacity="0.12"/>

  <rect x="110" y="125" width="980" height="425" rx="28" fill="url(#panel)" stroke="#64748b" stroke-opacity="0.28"/>

  <text x="160" y="190" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="800" fill="#e2e8f0">
    KI-Agent: sortiert &amp; stößt an
  </text>
  <text x="160" y="228" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" fill="#cbd5e1" opacity="0.9">
    Posteingang rein – strukturierte nächste Schritte raus.
  </text>

  <!-- Inbox -->
  <g transform="translate(160 285)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial">
    <rect width="270" height="210" rx="22" fill="#0a1525" stroke="#334155"/>
    <text x="24" y="48" font-size="18" font-weight="800" fill="#e2e8f0">Posteingang</text>
    <g fill="#94a3b8" opacity="0.9">
      <rect x="24" y="72" width="222" height="22" rx="10" />
      <rect x="24" y="106" width="190" height="22" rx="10" />
      <rect x="24" y="140" width="210" height="22" rx="10" />
    </g>
    <circle cx="236" cy="48" r="10" fill="#3b82f6" opacity="0.85"/>
  </g>

  <!-- Agent -->
  <g transform="translate(490 295)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial">
    <rect width="260" height="190" rx="26" fill="#0a1525" stroke="#334155"/>
    <text x="24" y="52" font-size="18" font-weight="800" fill="#e2e8f0">KI-Agent</text>
    <circle cx="210" cy="50" r="10" fill="#22c55e" opacity="0.9"/>
    <g fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.9">
      <path d="M72 96h116"/>
      <path d="M72 132h116"/>
      <path d="M72 168h86"/>
    </g>
    <g fill="#ec4899" opacity="0.9">
      <circle cx="58" cy="96" r="7"/>
      <circle cx="58" cy="132" r="7"/>
      <circle cx="58" cy="168" r="7"/>
    </g>
  </g>

  <!-- Outputs -->
  <g transform="translate(800 270)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial">
    <rect width="290" height="255" rx="22" fill="#0a1525" stroke="#334155"/>
    <text x="24" y="48" font-size="18" font-weight="800" fill="#e2e8f0">Ausgabe</text>

    <g>
      <rect x="24" y="74" width="242" height="44" rx="14" fill="#0f1b33" stroke="#334155"/>
      <text x="44" y="102" font-size="13" fill="#cbd5e1">Rückfrage an Kunden</text>
      <circle cx="36" cy="96" r="6" fill="#ec4899"/>
    </g>
    <g>
      <rect x="24" y="128" width="242" height="44" rx="14" fill="#0f1b33" stroke="#334155"/>
      <text x="44" y="156" font-size="13" fill="#cbd5e1">Ticket / Notiz fürs Team</text>
      <circle cx="36" cy="150" r="6" fill="#3b82f6"/>
    </g>
    <g>
      <rect x="24" y="182" width="242" height="44" rx="14" fill="#0f1b33" stroke="#334155"/>
      <text x="44" y="210" font-size="13" fill="#cbd5e1">Terminvorschlag / Kalender</text>
      <circle cx="36" cy="204" r="6" fill="#22c55e"/>
    </g>
  </g>

  <!-- Connectors -->
  <g fill="none" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" opacity="0.75">
    <path d="M430 390h60"/>
    <path d="M750 390h50"/>
    <path d="M490 390l-12-9M490 390l-12 9"/>
    <path d="M800 390l-12-9M800 390l-12 9"/>
