<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b86"/>
      <stop offset="1" stop-color="#0a1525"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1222" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0f1b33" stop-opacity="0.82"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="280" cy="150" r="150" fill="#3b82f6" opacity="0.14"/>
  <circle cx="980" cy="540" r="220" fill="#ec4899" opacity="0.12"/>

  <rect x="110" y="125" width="980" height="425" rx="28" fill="url(#panel)" stroke="#94a3b8" stroke-opacity="0.28"/>

  <text x="160" y="190" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="800" fill="#e2e8f0">
    KI-Telefonassistent: Anruf rein, Ticket raus
  </text>
  <text x="160" y="228" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" fill="#cbd5e1" opacity="0.9">
    Sauber erfasst, zusammengefasst und ans Team übergeben.
  </text>

  <!-- Phone -->
  <g transform="translate(160 285)">
    <rect width="300" height="250" rx="26" fill="#0a1525" stroke="#334155"/>
    <text x="24" y="48" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" font-weight="800" fill="#e2e8f0">
      Anruf
    </text>
    <g fill="none" stroke="#60a5fa" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
      <path d="M110 78c20 20 60 20 80 0"/>
      <path d="M95 110c35 35 95 35 130 0"/>
      <path d="M82 144c52 52 146 52 198 0"/>
    </g>
    <rect x="24" y="175" width="252" height="18" rx="9" fill="#0f1b33" stroke="#334155"/>
    <rect x="24" y="203" width="220" height="18" rx="9" fill="#0f1b33" stroke="#334155"/>
    <rect x="24" y="231" width="240" height="18" rx="9" fill="#0f1b33" stroke="#334155"/>
  </g>

  <!-- Transcript -->
  <g transform="translate(500 285)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial">
    <rect width="320" height="250" rx="26" fill="#0a1525" stroke="#334155"/>
    <text x="24" y="48" font-size="18" font-weight="800" fill="#e2e8f0">Zusammenfassung</text>
    <g fill="#94a3b8" opacity="0.9">
      <rect x="24" y="74" width="272" height="18" rx="9"/>
      <rect x="24" y="102" width="250" height="18" rx="9"/>
      <rect x="24" y="130" width="262" height="18" rx="9"/>
      <rect x="24" y="158" width="230" height="18" rx="9"/>
    </g>
    <rect x="24" y="194" width="272" height="32" rx="16" fill="#22c55e" opacity="0.20" stroke="#22c55e"/>
    <text x="40" y="216" font-size="12" fill="#86efac">Name · Adresse · Anliegen · Zeitfenster</text>
  </g>

  <!-- Ticket / Calendar -->
  <g transform="translate(860 305)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial">
    <rect width="230" height="210" rx="26" fill="#0a1525" stroke="#334155"/>
    <text x="22" y="44" font-size="18" font-weight="800" fill="#e2e8f0">Übergabe</text>
    <rect x="22" y="62" width="186" height="60" rx="16" fill="#0f1b33" stroke="#334155"/>
    <text x="40" y="92" font-size="13" fill="#cbd5e1">Ticket</text>
    <rect x="22" y="134" width="186" height="54" rx="16" fill="#0f1b33" stroke="#334155"/>
    <text x="40" y="165" font-size="13" fill="#cbd5e1">Kalender</text>
    <path d="M160 164l16 16 28-40" fill="none" stroke="#22c55e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Connectors -->
  <g fill="none" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" opacity="0.75">
    <path d="M460 410h40"/>
    <path d="M820 410h40"/>
    <path d="M500 410l-12-9M500 410l-12 9"/>
    <path d="M860 410l-12-9M860 410l-12 9"/>
  </g>
</svg>
